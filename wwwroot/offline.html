<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F4E79">
  <title>Sem conexao — Aprovacao NF Pronep</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    :root {
      --azul-escuro: #1F4E79;
      --azul-claro: #27AAE1;
      --cinza-fundo: #F4F8FB;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cinza-fundo);
      color: #2C3E50;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(31, 78, 121, 0.12);
      padding: 40px 32px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #FFF5F5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }
    h1 {
      color: var(--azul-escuro);
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      color: #647883;
      line-height: 1.55;
      margin: 0 0 24px;
      font-size: 15px;
    }
    .btn {
      display: inline-block;
      background: var(--azul-claro);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--azul-escuro); }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #95A5B0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sem conexao</h1>
    <p>
      Voce esta offline no momento. O sistema precisa de internet pra carregar
      a fila de NFs, fornecedores e validacoes. Verifique sua conexao e tente novamente.
    </p>
    <button class="btn" onclick="location.reload()">Tentar novamente</button>
    <div class="footer">Aprovacao NF Pronep · Pronep Life Care</div>
  </div>
  <script>
    // Re-tenta automaticamente quando a rede voltar
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
